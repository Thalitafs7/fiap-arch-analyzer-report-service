# NOTE: Ensure "Allow GitHub Actions to create and approve pull requests"
# is enabled in Settings > Actions > General.

name: CD Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build, tag, and push image
        env:
          ECR_REPOSITORY: report-service-repo # Set your repository name
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Example build command - adjust for Flask or .NET
          echo "Building Docker image..."
          # docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          # docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: |
          # aws eks update-kubeconfig --region us-east-1 --name report-service-cluster
          echo "Updating kubeconfig..."

      - name: Create Git Tag for Release
        id: create_tag
        run: |
          # Try to get the version from the merge commit message if it's a release PR
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ "Release: release/" ]]; then
            VERSION=${COMMIT_MSG#*release/}
            VERSION=${VERSION%% *} # Trim any extra characters

            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"

            echo "Creating tag v$VERSION"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Deploy to EKS
        run: |
          # Apply manifests from a directory named 'k8s' or similar
          # kubectl apply -f k8s/
          echo "Deploying to EKS..."
