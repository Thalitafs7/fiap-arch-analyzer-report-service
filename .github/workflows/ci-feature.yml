name: CI Feature Branch

on:
  push:
    branches:
      - "feature/*"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request to Develop
        run: |
          # Fetch develop branch to ensure common history
          git fetch origin develop

          # Check if PR already exists
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --base develop --json number | jq 'length > 0')

          if [ "$PR_EXISTS" = "false" ]; then
            gh pr create \
              --title "Merge ${{ github.ref_name }} into develop" \
              --body "Automated PR from feature branch to develop." \
              --base develop \
              --head "${{ github.ref_name }}"
          else
            echo "PR already exists for ${{ github.ref_name }} to develop."
          fi
