name: CI Release Branch

on:
  push:
    branches:
      - "release/*"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-main-pr:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request to Main
        run: |
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --base main --json number | jq 'length > 0')

          if [ "$PR_EXISTS" = "false" ]; then
            gh pr create \
              --title "Finalize Release ${{ github.ref_name }}" \
              --body "Automated PR from release branch to main." \
              --base main \
              --head "${{ github.ref_name }}"
          else
            echo "PR already exists for ${{ github.ref_name }} to main."
          fi
