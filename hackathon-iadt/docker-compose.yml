version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: hackathon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hackathon_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hackathon}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-hackathon123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: hackathon_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon123}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon_db}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./pgvector/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackathon} -d ${POSTGRES_DB:-hackathon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ia-service:
    build:
      context: ./ia-service
      dockerfile: Dockerfile
    container_name: hackathon_ia_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon123}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon_db}
      POSTGRES_HOST: pgvector
      POSTGRES_PORT: 5432
      POSTGRES_CONNECTION_STRING: postgresql+psycopg://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:-hackathon123}@pgvector:5432/${POSTGRES_DB:-hackathon_db}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Report Agent backend
      REPORT_MODEL_BACKEND: ${REPORT_MODEL_BACKEND:-langchain}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-}
      # Fine-tuning — HuggingFace (opcional)
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      HUGGINGFACE_ENDPOINT_URL: ${HUGGINGFACE_ENDPOINT_URL:-}
      # Fine-tuning — local (opcional)
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-}
      BASE_MODEL_ID: ${BASE_MODEL_ID:-}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # RabbitMQ
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-hackathon}:${RABBITMQ_PASSWORD:-hackathon123}@rabbitmq:5672/
      RABBITMQ_EXCHANGE: reports.events
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  streamlit-app:
    build:
      context: ./streamlit-app
      dockerfile: Dockerfile
    container_name: hackathon_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      IA_SERVICE_URL: http://ia-service:8000
      REPORT_API_URL: http://report-api:8001
      REQUEST_TIMEOUT: "300"
    depends_on:
      - ia-service
      - report-api

  celery-worker:
    build:
      context: ./ia-service
      dockerfile: Dockerfile
    container_name: hackathon_celery_worker
    restart: unless-stopped
    command: celery -A app.infrastructure.celery.celery_app worker --loglevel=info --concurrency=2
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon123}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon_db}
      POSTGRES_HOST: pgvector
      POSTGRES_PORT: 5432
      POSTGRES_CONNECTION_STRING: postgresql+psycopg://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:-hackathon123}@pgvector:5432/${POSTGRES_DB:-hackathon_db}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REPORT_MODEL_BACKEND: ${REPORT_MODEL_BACKEND:-langchain}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      HUGGINGFACE_ENDPOINT_URL: ${HUGGINGFACE_ENDPOINT_URL:-}
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-}
      BASE_MODEL_ID: ${BASE_MODEL_ID:-}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-hackathon}:${RABBITMQ_PASSWORD:-hackathon123}@rabbitmq:5672/
      RABBITMQ_EXCHANGE: reports.events
    depends_on:
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-api:
    build:
      context: ./report-api
      dockerfile: Dockerfile
    container_name: hackathon_report_api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon123}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon_db}
      POSTGRES_HOST: pgvector
      POSTGRES_PORT: 5432
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      pgvector:
        condition: service_healthy

volumes:
  pgvector_data:
    driver: local
  rabbitmq_data:
    driver: local
