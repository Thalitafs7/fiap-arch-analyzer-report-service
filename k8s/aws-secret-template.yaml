# aws-secret-template.yaml — report-service
#
# This file is a TEMPLATE only. It documents the keys that the secrets-sync
# init container materialises into the in-cluster Secret named "report-secret".
#
# DO NOT commit real values here.
# The init container fetches the actual values from AWS Secrets Manager at pod
# startup using the node's LabRole credentials (IMDS) and writes them to the
# emptyDir{medium: Memory} volume, which is then projected into this Secret.
#
# Secrets Manager paths consumed:
#   arch-analyzer/db/report   → ConnectionStrings__DefaultConnection (read-only PG user)
#   arch-analyzer/auth/jwt    → Jwt__Key
#
# To manually create this Secret for local dev (never commit):
#   kubectl create secret generic report-secret \
#     --namespace arch-analyzer-ia \
#     --from-literal=ConnectionStrings__DefaultConnection='Host=...;Username=report_ro;Password=...;Database=archanalyzer' \
#     --from-literal=Jwt__Key='<signing-key>'
#
apiVersion: v1
kind: Secret
metadata:
  name: report-secret
  namespace: arch-analyzer-ia
  labels:
    app.kubernetes.io/name: report-service
    app.kubernetes.io/part-of: arch-analyzer
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # Postgres read-only connection string for the report service.
  # Populated at runtime by the secrets-sync init container from
  # arch-analyzer/db/report in AWS Secrets Manager.
  ConnectionStrings__DefaultConnection: "<populated-by-init-container>"

  # JWT signing key shared across services.
  # Populated at runtime from arch-analyzer/auth/jwt.
  Jwt__Key: "<populated-by-init-container>"
